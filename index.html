<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BUTTERFLY | Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css"/>
    <style>
        :root { --bg: #121212; --accent: #9b8a78; --card: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; color: white; overflow: hidden; }
        .login-card { background: var(--card); padding: 40px 30px; border-radius: 30px; text-align: center; width: 85%; max-width: 400px; box-shadow: 0 15px 35px rgba(0,0,0,0.7); display: flex; flex-direction: column; }
        .logo { width: 80px; height: 80px; border-radius: 20px; margin: 0 auto 15px; border: 1.5px solid #333; object-fit: cover; display: block; }
        .iti { width: 100%; margin-bottom: 20px; color: black; }
        #phone, #otp-input, #msg-input { width: 100%; height: 50px; border-radius: 12px; border: 1px solid #444; background: #2a2a2a; color: white; font-size: 16px; box-sizing: border-box; padding: 0 15px; }
        #phone { padding-left: 90px !important; }
        .btn-primary { background: var(--accent); color: white; border: none; width: 100%; padding: 16px; border-radius: 12px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        
        /* Contenedor de Chat */
        #chat-container { display: none; flex-direction: column; height: 450px; width: 100%; }
        #messages { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; padding: 15px; background: #0b0b0b; border-radius: 15px; border: 1px solid #333; }
        .msg-bubble { max-width: 80%; padding: 10px 14px; border-radius: 15px; font-size: 14px; line-height: 1.4; position: relative; }
        .msg-user { font-weight: bold; font-size: 10px; display: block; margin-bottom: 4px; opacity: 0.8; }
        
        /* Estilos de burbujas dinámicas */
        .my-msg { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 2px; }
        .other-msg { align-self: flex-start; background: #262626; color: white; border-bottom-left-radius: 2px; }
    </style>
</head>
<body>

<div class="login-card">
    <div id="auth-section">
        <img src="Logo.jpeg" class="logo" alt="Butterfly Logo">
        <h2 style="margin: 10px 0;">BUTTERFLY</h2>
        <div style="color: #777; font-size: 12px; margin-bottom: 25px; letter-spacing: 2px;">DIGITAL LUXURY</div>
        
        <input type="tel" id="phone">
        <div id="recaptcha-container"></div>
        
        <input type="text" id="otp-input" placeholder="Código de 6 dígitos" maxlength="6" style="display:none; text-align:center; letter-spacing:4px; margin-top:10px;">
        <button class="btn-primary" id="btn-action">Continuar</button>
    </div>

    <div id="chat-container">
        <div id="messages"></div>
        <div style="display:flex; gap: 8px;">
            <input type="text" id="msg-input" placeholder="Escribe un mensaje...">
            <button id="btn-send" style="background:var(--accent); border:none; border-radius:12px; width: 50px; color:white; cursor:pointer; font-size: 20px;">↑</button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCpbEqoc9-lgVna4c8SsdUimZLQGjSN3gE",
        authDomain: "butterfly-2f1ba.firebaseapp.com",
        projectId: "butterfly-2f1ba",
        storageBucket: "butterfly-2f1ba.firebasestorage.app",
        messagingSenderId: "668042697742",
        appId: "1:668042697742:web:4574346fb1e055b28ef05f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const iti = window.intlTelInput(document.querySelector("#phone"), {
        initialCountry: "py",
        separateDialCode: true,
        utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/utils.js",
    });

    let step = 1;
    let confirmationResult = null;

    window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', { 'size': 'invisible' });

    const btnAction = document.getElementById('btn-action');

    btnAction.addEventListener('click', async () => {
        if (step === 1) {
            const phoneNumber = iti.getNumber();
            try {
                btnAction.innerText = "Enviando...";
                confirmationResult = await signInWithPhoneNumber(auth, phoneNumber, window.recaptchaVerifier);
                document.getElementById('otp-input').style.display = 'block';
                document.getElementById('phone').style.display = 'none';
                document.querySelector(".iti").style.display = 'none';
                btnAction.innerText = "Verificar Código";
                step = 2;
            } catch (e) {
                alert("Error: " + e.message);
                btnAction.innerText = "Continuar";
            }
        } else {
            const code = document.getElementById('otp-input').value;
            confirmationResult.confirm(code).then(() => {
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('chat-container').style.display = 'flex';
                loadMessages();
            }).catch(() => alert("Código incorrecto"));
        }
    });

    window.sendMsg = async () => {
        const input = document.getElementById('msg-input');
        if (!input.value.trim()) return;
        await addDoc(collection(db, "chats"), {
            text: input.value,
            user: auth.currentUser.phoneNumber,
            timestamp: serverTimestamp()
        });
        input.value = "";
    };

    document.getElementById('btn-send').addEventListener('click', window.sendMsg);
    document.getElementById('msg-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') window.sendMsg(); });

    function loadMessages() {
        const q = query(collection(db, "chats"), orderBy("timestamp", "asc"));
        onSnapshot(q, (snapshot) => {
            const msgDiv = document.getElementById('messages');
            msgDiv.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                const isMe = data.user === auth.currentUser.phoneNumber;
                const safeText = data.text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                msgDiv.innerHTML += `
                    <div class="msg-bubble ${isMe ? 'my-msg' : 'other-msg'}">
                        <span class="msg-user">${isMe ? 'Tú' : data.user}</span>
                        ${safeText}
                    </div>`;
            });
            msgDiv.scrollTop = msgDiv.scrollHeight;
        });
    }
</script>
</body>
</html>
