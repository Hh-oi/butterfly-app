<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BUTTERFLY</title>
    <link rel="apple-touch-icon" href="Logo.jpeg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css"/>
    <style>
        :root { --wa-bg: #0b141a; --wa-header: #202c33; --wa-teal: #00a884; --wa-text: #e9edef; --wa-msg-my: #005c4b; --wa-msg-other: #233138; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--wa-bg); margin: 0; color: var(--wa-text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* HEADER */
        .app-bar { background: var(--wa-header); padding: 15px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #222d34; z-index: 10; }
        .logo-img { width: 38px; height: 38px; border-radius: 10px; object-fit: cover; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .brand-name { font-size: 22px; font-weight: 600; color: #8696a0; letter-spacing: 1px; }

        /* LISTA DE CHATS */
        #chat-list { flex: 1; overflow-y: auto; background: var(--wa-bg); }
        .contact-card { display: flex; align-items: center; padding: 14px 16px; gap: 15px; border-bottom: 0.5px solid #222d34; transition: background 0.3s; cursor: pointer; }
        .contact-card:active { background: #202c33; }
        .pfp-circle { width: 50px; height: 50px; border-radius: 50%; background: #6a7175; overflow: hidden; border: 1px solid #3b4a54; }
        .pfp-circle img { width: 100%; height: 100%; object-fit: cover; }

        /* MODAL PROFESIONAL */
        #modal-container { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-box { background: #233138; width: 85%; max-width: 350px; padding: 25px; border-radius: 25px; text-align: center; border: 1px solid #3b4a54; }
        .modal-input { width: 100%; padding: 14px; margin: 15px 0; background: #2a3942; border: 1px solid #3b4a54; border-radius: 12px; color: white; outline: none; box-sizing: border-box; }
        .modal-buttons { display: flex; gap: 12px; }
        .modal-btn { flex: 1; padding: 14px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: opacity 0.2s; }
        .btn-confirm { background: var(--wa-teal); color: white; }
        .btn-confirm:disabled { opacity: 0.5; }

        /* VISTA CHAT */
        #chat-screen { display: none; position: fixed; inset: 0; background: #0b141a url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); z-index: 100; flex-direction: column; }
        .msg-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .bubble { max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: 15px; position: relative; line-height: 1.4; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        .my { align-self: flex-end; background: var(--wa-msg-my); border-top-right-radius: 2px; }
        .other { align-self: flex-start; background: var(--wa-msg-other); border-top-left-radius: 2px; }

        /* BARRA INFERIOR */
        .input-bar { background: #1f2c33; padding: 12px; display: flex; align-items: center; gap: 10px; }
        #msg-input { flex: 1; background: #2a3942; border: none; padding: 12px 18px; border-radius: 25px; color: white; outline: none; font-size: 16px; }
        
        /* BOTÓN FLOTANTE */
        .fab { position: fixed; bottom: 25px; right: 20px; width: 60px; height: 60px; border-radius: 50%; background: var(--wa-teal); color: white; border: none; font-size: 28px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 50; }

        /* LOGIN */
        #login-overlay { position: fixed; inset: 0; background: var(--wa-bg); z-index: 1000; display: flex; align-items: center; justify-content: center; text-align: center; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div style="width: 85%; max-width: 320px;">
        <img src="Logo.jpeg" style="width:110px; border-radius:25px; margin-bottom:20px; box-shadow: 0 10px 20px rgba(0,0,0,0.4);">
        <h1 style="color:white; letter-spacing: 3px; font-weight: 700;">BUTTERFLY</h1>
        <p style="color:#8696a0; margin-bottom:25px;">Mensajería Privada</p>
        <input type="tel" id="phone-field">
        <div id="recaptcha-container"></div>
        <input type="text" id="otp-field" placeholder="Código de acceso" style="display:none; width:100%; padding:15px; margin: 20px 0; background:#2a3942; border:none; color:white; border-radius:12px; text-align:center;">
        <button id="login-btn" style="width:100%; padding:16px; background:var(--wa-teal); color:white; border:none; border-radius:12px; font-weight:bold; font-size:16px;">INGRESAR</button>
    </div>
</div>

<div id="modal-container">
    <div class="modal-box">
        <h3>Nuevo Contacto</h3>
        <input type="tel" id="new-contact-num" class="modal-input" placeholder="+595 9xx xxx xxx">
        <div class="modal-buttons">
            <button class="modal-btn btn-cancel" onclick="document.getElementById('modal-container').style.display='none'">Cancelar</button>
            <button class="modal-btn btn-confirm" id="modal-add">Agregar</button>
        </div>
    </div>
</div>

<div class="app-bar">
    <img src="Logo.jpeg" class="logo-img">
    <span class="brand-name">Butterfly</span>
</div>

<div id="chat-list"></div>
<button class="fab" onclick="document.getElementById('modal-container').style.display='flex'">+</button>

<div id="chat-screen">
    <div class="app-bar">
        <span onclick="document.getElementById('chat-screen').style.display='none'" style="cursor:pointer; font-size:26px;">←</span>
        <div class="pfp-circle" style="width:36px; height:36px;"><img src="Logo.jpeg"></div>
        <div style="flex:1;">
            <div id="chat-user-name" style="font-weight:500;">Usuario</div>
            <div style="font-size:11px; color:var(--wa-teal);">en línea ahora</div>
        </div>
    </div>
    <div class="msg-box" id="msg-box"></div>
    <div class="input-bar">
        <input type="text" id="msg-input" placeholder="Escribe un mensaje...">
        <button id="send-btn" style="background:none; border:none; color:var(--wa-teal); font-size:28px;">➤</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, RecaptchaVerifier, signInWithPhoneNumber, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCpbEqoc9-lgVna4c8SsdUimZLQGjSN3gE",
        authDomain: "butterfly-2f1ba.firebaseapp.com",
        projectId: "butterfly-2f1ba",
        storageBucket: "butterfly-2f1ba.firebasestorage.app",
        messagingSenderId: "668042697742",
        appId: "1:668042697742:web:4574346fb1e055b28ef05f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let activeChatId = null, confirmation = null;

    const iti = window.intlTelInput(document.querySelector("#phone-field"), { initialCountry: "py", separateDialCode: true });

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('login-overlay').style.display = 'none';
            loadContacts();
        }
    });

    document.getElementById('login-btn').onclick = async () => {
        const btn = document.getElementById('login-btn');
        if (btn.innerText === "INGRESAR") {
            btn.innerText = "ENVIANDO...";
            const verifier = new RecaptchaVerifier(auth, 'recaptcha-container', { 'size': 'invisible' });
            confirmation = await signInWithPhoneNumber(auth, iti.getNumber(), verifier);
            document.getElementById('otp-field').style.display = 'block';
            btn.innerText = "VERIFICAR CÓDIGO";
        } else {
            await confirmation.confirm(document.getElementById('otp-field').value);
        }
    };

    document.getElementById('modal-add').onclick = async () => {
        const num = document.getElementById('new-contact-num').value;
        if (num.trim()) {
            await addDoc(collection(db, "contacts"), { owner: auth.currentUser.phoneNumber, name: num, phone: num });
            document.getElementById('modal-container').style.display = 'none';
            document.getElementById('new-contact-num').value = "";
        }
    };

    function loadContacts() {
        onSnapshot(query(collection(db, "contacts"), where("owner", "==", auth.currentUser.phoneNumber)), (snap) => {
            const list = document.getElementById('chat-list');
            list.innerHTML = "";
            snap.forEach(d => {
                const c = d.data();
                const card = document.createElement('div');
                card.className = 'contact-card';
                card.innerHTML = `<div class="pfp-circle"><img src="Logo.jpeg"></div><div><h4 style="margin:0;">${c.name}</h4><p style="margin:0;font-size:12px;color:#8696a0;">Presiona para chatear</p></div>`;
                card.onclick = () => openChat(c.phone);
                list.appendChild(card);
            });
        });
    }

    window.openChat = (phone) => {
        activeChatId = [auth.currentUser.phoneNumber, phone].sort().join("_");
        document.getElementById('chat-screen').style.display = 'flex';
        document.getElementById('chat-user-name').innerText = phone;
        
        const q = query(collection(db, "chats"), where("chatId", "==", activeChatId), orderBy("timestamp", "asc"));
        onSnapshot(q, (snap) => {
            const box = document.getElementById('msg-box');
            box.innerHTML = "";
            snap.forEach(m => {
                const msg = m.data();
                const isMe = msg.user === auth.currentUser.phoneNumber;
                box.innerHTML += `<div class="bubble ${isMe ? 'my' : 'other'}">${msg.text}</div>`;
            });
            box.scrollTo({ top: box.scrollHeight, behavior: 'smooth' });
        });
    };

    const sendMessage = async () => {
        const input = document.getElementById('msg-input');
        if (!input.value.trim()) return;
        const text = input.value;
        input.value = "";
        await addDoc(collection(db, "chats"), {
            chatId: activeChatId,
            user: auth.currentUser.phoneNumber,
            text: text,
            timestamp: serverTimestamp()
        });
    };

    document.getElementById('send-btn').onclick = sendMessage;
    document.getElementById('msg-input').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
</script>
</body>
</html>
