<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUTTERFLY</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #fafafa; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Header con Logo */
        header { background: #fff; padding: 10px; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: center; gap: 10px; }
        header img { width: 40px; height: 40px; border-radius: 10px; }
        header h1 { font-size: 1rem; letter-spacing: 3px; font-weight: 300; margin: 0; }

        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        /* Burbujas de mensaje */
        .message { padding: 10px 15px; border-radius: 18px; max-width: 70%; font-size: 0.9rem; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .user-name { font-size: 0.7rem; font-weight: bold; margin-bottom: 4px; display: block; color: #888; }
        
        .other { align-self: flex-start; background: #fff; border: 1px solid #eee; }
        .mine { align-self: flex-end; background: #1a1a1a; color: #fff; border-bottom-right-radius: 2px; }
        .mine .user-name { color: #aaa; }

        footer { padding: 15px; background: #fff; border-top: 1px solid #eee; display: flex; gap: 10px; }
        input { flex: 1; border: 1px solid #ddd; padding: 12px 20px; border-radius: 25px; outline: none; }
        button { background: #1a1a1a; color: #fff; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <img src="Logo.jpeg" alt="Logo">
    <h1>BUTTERFLY</h1>
</header>

<div id="chat-box"></div>

<footer>
    <input type="text" id="msgInput" placeholder="Escribe un mensaje..." autocomplete="off">
    <button id="sendBtn">ENVIAR</button>
</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // TU CONFIGURACIÓN (Mantenla igual a la anterior)
  const firebaseConfig = {
    apiKey: "AIzaSyCpbEqoc9-lgVna4c8SsdUimZLQGjSN3gE",
    authDomain: "butterfly-2f1ba.firebaseapp.com",
    projectId: "butterfly-2f1ba",
    storageBucket: "butterfly-2f1ba.firebasestorage.app",
    messagingSenderId: "668042697742",
    appId: "1:668042697742:web:655b9d4ba13088d58ef05f",
    measurementId: "G-NCW8JDWE5V"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const messagesCol = collection(db, "messages");

  // Lógica de Usuario
  let usuario = localStorage.getItem('chat_user');
  if (!usuario) {
      usuario = prompt("¡Bienvenida a BUTTERFLY! ¿Cuál es tu nombre?") || "Anónimo";
      localStorage.setItem('chat_user', usuario);
  }

  const sendAction = async () => {
      const input = document.getElementById('msgInput');
      if(input.value.trim() !== "") {
          const text = input.value;
          input.value = "";
          await addDoc(messagesCol, {
              text: text,
              user: usuario,
              createdAt: serverTimestamp()
          });
      }
  };

  document.getElementById('sendBtn').onclick = sendAction;

  const q = query(messagesCol, orderBy("createdAt", "asc"));
  onSnapshot(q, (snapshot) => {
      const box = document.getElementById('chat-box');
      box.innerHTML = "";
      snapshot.forEach((doc) => {
          const msg = doc.data();
          const isMine = msg.user === usuario;
          const div = document.createElement('div');
          div.className = `message ${isMine ? 'mine' : 'other'}`;
          div.innerHTML = `<span class="user-name">${msg.user}</span>${msg.text}`;
          box.appendChild(div);
      });
      box.scrollTop = box.scrollHeight;
  });
</script>

</body>
</html>
