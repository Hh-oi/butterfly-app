<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BUTTERFLY | WhatsApp</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css"/>
    <style>
        :root { --wa-bg: #0b141a; --wa-header: #202c33; --wa-accent: #9b8a78; --wa-text: #e9edef; --wa-my-msg: #005c4b; --wa-other-msg: #202c33; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--wa-bg); margin: 0; color: var(--wa-text); height: 100vh; overflow: hidden; }
        
        /* Login */
        #auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; text-align: center; }
        .login-card { background: #111b21; padding: 30px; border-radius: 20px; width: 100%; max-width: 320px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        
        /* Pantalla de Contactos */
        #contacts-screen { display: none; flex-direction: column; height: 100vh; }
        .header { background: var(--wa-header); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        #contacts-list { flex-grow: 1; overflow-y: auto; }
        .contact-item { padding: 15px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 0.5px solid #222d34; cursor: pointer; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; background: #6a7175; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        
        /* Pantalla de Chat */
        #chat-screen { display: none; flex-direction: column; height: 100vh; background-color: #0b141a; }
        #messages-list { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 80%; padding: 8px 12px; border-radius: 8px; font-size: 15px; }
        .my { align-self: flex-end; background: var(--wa-my-msg); }
        .other { align-self: flex-start; background: var(--wa-other-msg); }
        
        .input-bar { background: #202c33; padding: 10px; display: flex; align-items: center; gap: 10px; }
        #msg-input { flex-grow: 1; background: #2a3942; border: none; border-radius: 20px; padding: 10px 15px; color: white; outline: none; }
        .btn-add { position: fixed; bottom: 30px; right: 20px; width: 55px; height: 55px; border-radius: 50%; background: var(--wa-accent); border: none; color: white; font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="login-card">
        <img src="Logo.jpeg" style="width:70px; border-radius:15px; margin-bottom:10px;">
        <h3>BUTTERFLY</h3>
        <input type="tel" id="phone" style="width:100%; margin-bottom:10px;">
        <div id="recaptcha-container"></div>
        <input type="text" id="otp-input" placeholder="Código SMS" style="display:none; width:100%; padding:10px; margin-bottom:10px; background:#2a3942; border:none; color:white; border-radius:5px;">
        <button id="btn-login" style="width:100%; padding:12px; background:var(--wa-accent); border:none; color:white; font-weight:bold; border-radius:5px;">COMENZAR</button>
    </div>
</div>

<div id="contacts-screen">
    <div class="header"><span>Butterfly Luxury</span></div>
    <div id="contacts-list"></div>
    <button class="btn-add" id="add-contact-btn">+</button>
</div>

<div id="chat-screen">
    <div class="header">
        <div style="display:flex; align-items:center; gap:10px;">
            <span id="back-to-contacts" style="cursor:pointer; padding: 5px;">←</span>
            <div id="chat-name">Chat</div>
        </div>
    </div>
    <div id="messages-list"></div>
    <div class="input-bar">
        <input type="text" id="msg-input" placeholder="Escribe un mensaje">
        <button id="btn-send" style="background:none; border:none; color:var(--wa-accent); font-size:20px;">➤</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, RecaptchaVerifier, signInWithPhoneNumber, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCpbEqoc9-lgVna4c8SsdUimZLQGjSN3gE",
        authDomain: "butterfly-2f1ba.firebaseapp.com",
        projectId: "butterfly-2f1ba",
        storageBucket: "butterfly-2f1ba.firebasestorage.app",
        messagingSenderId: "668042697742",
        appId: "1:668042697742:web:4574346fb1e055b28ef05f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentChatId = null;
    let confirmationResult = null;
    const iti = window.intlTelInput(document.querySelector("#phone"), { initialCountry: "py", separateDialCode: true });

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('contacts-screen').style.display = 'flex';
            loadContacts();
        }
    });

    document.getElementById('btn-login').onclick = async () => {
        const btn = document.getElementById('btn-login');
        if (btn.innerText === "COMENZAR") {
            const verifier = new RecaptchaVerifier(auth, 'recaptcha-container', { 'size': 'invisible' });
            confirmationResult = await signInWithPhoneNumber(auth, iti.getNumber(), verifier);
            document.getElementById('otp-input').style.display = 'block';
            btn.innerText = "VERIFICAR";
        } else {
            await confirmationResult.confirm(document.getElementById('otp-input').value);
        }
    };

    document.getElementById('add-contact-btn').onclick = async () => {
        const num = prompt("Número de contacto (Ej: +59598...):");
        if (num) {
            await addDoc(collection(db, "contacts"), {
                owner: auth.currentUser.phoneNumber,
                contactNum: num,
                name: num,
                createdAt: serverTimestamp()
            });
        }
    };

    function loadContacts() {
        const q = query(collection(db, "contacts"), where("owner", "==", auth.currentUser.phoneNumber));
        onSnapshot(q, (snapshot) => {
            const list = document.getElementById('contacts-list');
            list.innerHTML = "";
            snapshot.forEach(doc => {
                const data = doc.data();
                const div = document.createElement('div');
                div.className = 'contact-item';
                div.innerHTML = `<div class="avatar">${data.name.substring(1,3)}</div><div>${data.name}</div>`;
                div.onclick = () => openChat(data.contactNum);
                list.appendChild(div);
            });
        });
    }

    function openChat(contactNum) {
        currentChatId = [auth.currentUser.phoneNumber, contactNum].sort().join("_");
        document.getElementById('contacts-screen').style.display = 'none';
        document.getElementById('chat-screen').style.display = 'flex';
        document.getElementById('chat-name').innerText = contactNum;
        loadMessages();
    }

    document.getElementById('back-to-contacts').onclick = () => {
        document.getElementById('contacts-screen').style.display = 'flex';
        document.getElementById('chat-screen').style.display = 'none';
    };

    function loadMessages() {
        const q = query(collection(db, "messages"), where("chatId", "==", currentChatId), orderBy("timestamp", "asc"));
        onSnapshot(q, (snapshot) => {
            const container = document.getElementById('messages-list');
            container.innerHTML = "";
            snapshot.forEach(doc => {
                const data = doc.data();
                const isMe = data.sender === auth.currentUser.phoneNumber;
                container.innerHTML += `<div class="msg ${isMe ? 'my' : 'other'}">${data.text}</div>`;
            });
            container.scrollTop = container.scrollHeight;
        });
    }

    document.getElementById('btn-send').onclick = async () => {
        const input = document.getElementById('msg-input');
        if (!input.value.trim()) return;
        await addDoc(collection(db, "messages"), {
            chatId: currentChatId,
            sender: auth.currentUser.phoneNumber,
            text: input.value,
            timestamp: serverTimestamp()
        });
        input.value = "";
    };
</script>
</body>
</html>
