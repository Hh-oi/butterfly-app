<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUTTERFLY | Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #fdfaf7; --text: #1c1c1c; --accent: #9b8a78;
            --item-border: #f0f0f0;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; color: var(--text); }

        #login-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; padding: 30px; text-align: center;
        }

        .logo-login { width: 85px; border-radius: 22px; margin-bottom: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        
        h2 { font-size: 24px; font-weight: 700; margin-bottom: 10px; }
        p { font-size: 14px; color: #888; margin-bottom: 35px; }

        /* Estilo para el input de teléfono con bandera */
        .iti { width: 100%; max-width: 320px; margin-bottom: 20px; }
        .iti__flag-container { padding: 2px; }
        #phone {
            width: 100%; height: 50px; border-radius: 14px; border: 1px solid #ddd;
            background: white; font-size: 16px; outline: none; padding-left: 50px !important;
        }

        .btn-verify {
            background: var(--accent); color: white; border: none; padding: 16px;
            border-radius: 14px; width: 100%; max-width: 320px; font-weight: bold;
            font-size: 16px; cursor: pointer; transition: 0.3s;
        }
        .btn-verify:active { transform: scale(0.98); opacity: 0.9; }

        /* Estilo del código OTP */
        #otp-input {
            width: 100%; max-width: 320px; height: 50px; border-radius: 14px;
            border: 1px solid var(--accent); text-align: center; font-size: 20px;
            letter-spacing: 5px; margin-top: 15px; display: none; outline: none;
        }
    </style>
</head>
<body>

<div id="login-screen">
    <img src="Logo.jpeg" class="logo-login">
    <h2>Verifica tu número</h2>
    <p>BUTTERFLY Group ✨ enviará un código para confirmar que eres tú.</p>

    <input type="tel" id="phone">
    
    <div id="recaptcha-container" style="margin-top: 10px;"></div>

    <button class="btn-verify" id="btn-action" onclick="processLogin()">Enviar código</button>
    
    <input type="text" id="otp-input" placeholder="000000" maxlength="6">
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCpbEqoc9-lgVna4c8SsdUimZLQGjSN3gE",
        authDomain: "butterfly-2f1ba.firebaseapp.com",
        projectId: "butterfly-2f1ba",
        storageBucket: "butterfly-2f1ba.firebasestorage.app",
        messagingSenderId: "668042697742",
        appId: "1:668042697742:web:655b9d4ba13088d58ef05f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // INICIALIZAR LAS BANDERAS
    const phoneInput = document.querySelector("#phone");
    const iti = window.intlTelInput(phoneInput, {
        initialCountry: "py", // Paraguay por defecto 🇵🇾
        preferredCountries: ["py", "ar", "br", "es"],
        separateDialCode: true, // Esto separa el +595 del número
        utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/utils.js",
    });

    let step = 1; // 1: Enviar SMS, 2: Verificar OTP

    window.processLogin = async function() {
        const btn = document.getElementById('btn-action');
        
        if (step === 1) {
            const phoneNumber = iti.getNumber(); // Obtiene el número completo (+595981...)
            if (!phoneNumber) return alert("Ingresa un número válido");

            const recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', { 'size': 'invisible' });
            
            try {
                window.confirmationResult = await signInWithPhoneNumber(auth, phoneNumber, recaptchaVerifier);
                document.getElementById('phone').style.display = 'none';
                document.querySelector('.iti').style.display = 'none'; // Oculta el selector de banderas
                document.getElementById('otp-input').style.display = 'block';
                btn.innerText = "Verificar código";
                step = 2;
            } catch (error) {
                alert("Error al enviar: " + error.message);
            }
        } else {
            const code = document.getElementById('otp-input').value;
            window.confirmationResult.confirm(code).then(() => {
                alert("¡Bienvenida a BUTTERFLY! ✨");
                window.location.href = "chat.html"; // O la parte de tu app
            }).catch(() => alert("Código incorrecto"));
        }
    }
</script>
</body>
</html>
