<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BUTTERFLY</title>
    <link rel="apple-touch-icon" href="Logo.jpeg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css"/>
    <style>
        :root { --wa-bg: #0b141a; --wa-header: #202c33; --wa-teal: #00a884; --wa-text: #e9edef; --wa-msg-my: #005c4b; --wa-msg-other: #233138; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--wa-bg); margin: 0; color: var(--wa-text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* BARRA SUPERIOR */
        .app-bar { background: var(--wa-header); padding: 15px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #222d34; }
        .logo-img { width: 38px; height: 38px; border-radius: 10px; object-fit: cover; }
        .brand-name { font-size: 22px; font-weight: 600; color: #8696a0; }

        /* LISTA DE CHATS */
        #chat-list { flex: 1; overflow-y: auto; }
        .contact-card { display: flex; align-items: center; padding: 14px 16px; gap: 15px; border-bottom: 0.5px solid #222d34; cursor: pointer; }
        .pfp-circle { width: 50px; height: 50px; border-radius: 50%; background: #6a7175; overflow: hidden; }
        .pfp-circle img { width: 100%; height: 100%; object-fit: cover; }

        /* PANTALLA DE CHAT */
        #chat-screen { display: none; position: fixed; inset: 0; background: #0b141a url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); z-index: 100; flex-direction: column; }
        .msg-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .bubble { max-width: 78%; padding: 8px 12px; border-radius: 10px; font-size: 15px; position: relative; word-wrap: break-word; }
        .my { align-self: flex-end; background: var(--wa-msg-my); }
        .other { align-self: flex-start; background: var(--wa-msg-other); }

        .input-bar { background: #1f2c33; padding: 10px; display: flex; align-items: center; gap: 10px; }
        #msg-input { flex: 1; background: #2a3942; border: none; padding: 12px 16px; border-radius: 25px; color: white; outline: none; }
        .send-btn { color: var(--wa-teal); font-size: 26px; border: none; background: none; cursor: pointer; }

        /* ACCESO */
        #login-overlay { position: fixed; inset: 0; background: var(--wa-bg); z-index: 1000; display: flex; align-items: center; justify-content: center; text-align: center; }
        .fab { position: fixed; bottom: 20px; right: 20px; width: 56px; height: 56px; border-radius: 50%; background: var(--wa-teal); color: white; border: none; font-size: 24px; box-shadow: 0 4px 10px rgba(0,0,0,0.4); }
    </style>
</head>
<body>

<div id="login-overlay">
    <div style="width: 85%;">
        <img src="Logo.jpeg" style="width:100px; border-radius:20px; margin-bottom:20px;">
        <h1 style="color:white; letter-spacing: 2px;">BUTTERFLY</h1>
        <input type="tel" id="phone-field">
        <div id="recaptcha-container"></div>
        <input type="text" id="otp-field" placeholder="Código de verificación" style="display:none; width:100%; padding:15px; margin: 20px 0; background:#2a3942; border:none; color:white; border-radius:10px; text-align:center;">
        <button id="login-btn" style="width:100%; padding:15px; background:var(--wa-teal); color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">ENTRAR</button>
    </div>
</div>

<div class="app-bar">
    <img src="Logo.jpeg" class="logo-img">
    <span class="brand-name">Butterfly</span>
</div>

<div id="chat-list"></div>
<button class="fab" id="add-btn">+</button>

<div id="chat-screen">
    <div class="app-bar">
        <span id="back-btn" style="cursor:pointer; font-size:24px;">←</span>
        <img src="Logo.jpeg" class="logo-img" style="width:32px; height:32px;">
        <div style="flex:1;">
            <div id="chat-user-name" style="font-weight:500;">Chat</div>
            <div style="font-size:11px; color:var(--wa-teal);">en línea</div>
        </div>
    </div>
    <div class="msg-box" id="msg-box"></div>
    <div class="input-bar">
        <input type="text" id="msg-input" placeholder="Mensaje">
        <button id="send-btn" class="send-btn">➤</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, RecaptchaVerifier, signInWithPhoneNumber, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCpbEqoc9-lgVna4c8SsdUimZLQGjSN3gE",
        authDomain: "butterfly-2f1ba.firebaseapp.com",
        projectId: "butterfly-2f1ba",
        storageBucket: "butterfly-2f1ba.firebasestorage.app",
        messagingSenderId: "668042697742",
        appId: "1:668042697742:web:4574346fb1e055b28ef05f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let activeChatId = null, confirmation = null;

    const iti = window.intlTelInput(document.querySelector("#phone-field"), { initialCountry: "py", separateDialCode: true });

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('login-overlay').style.display = 'none';
            syncContacts();
        }
    });

    document.getElementById('login-btn').onclick = async () => {
        const btn = document.getElementById('login-btn');
        if (btn.innerText === "ENTRAR") {
            const verifier = new RecaptchaVerifier(auth, 'recaptcha-container', { 'size': 'invisible' });
            confirmation = await signInWithPhoneNumber(auth, iti.getNumber(), verifier);
            document.getElementById('otp-field').style.display = 'block';
            btn.innerText = "VERIFICAR";
        } else {
            await confirmation.confirm(document.getElementById('otp-field').value);
        }
    };

    document.getElementById('add-btn').onclick = async () => {
        const num = prompt("Número del contacto (+595...):");
        if (num) await addDoc(collection(db, "contacts"), { owner: auth.currentUser.phoneNumber, name: num, phone: num });
    };

    function syncContacts() {
        onSnapshot(query(collection(db, "contacts"), where("owner", "==", auth.currentUser.phoneNumber)), (snap) => {
            const list = document.getElementById('chat-list');
            list.innerHTML = "";
            snap.forEach(d => {
                const c = d.data();
                const card = document.createElement('div');
                card.className = 'contact-card';
                card.innerHTML = `<div class="pfp-circle"><img src="Logo.jpeg"></div><div><h4>${c.name}</h4><p style="font-size:12px;color:#8696a0;">Toca para hablar</p></div>`;
                card.onclick = () => openButterflyChat(c.phone);
                list.appendChild(card);
            });
        });
    }

    window.openButterflyChat = (phone) => {
        activeChatId = [auth.currentUser.phoneNumber, phone].sort().join("_");
        document.getElementById('chat-screen').style.display = 'flex';
        document.getElementById('chat-user-name').innerText = phone;
        
        // Listener de mensajes usando la colección "chats" e índice compuesto
        const q = query(collection(db, "chats"), where("chatId", "==", activeChatId), orderBy("timestamp", "asc"));
        onSnapshot(q, (snap) => {
            const box = document.getElementById('msg-box');
            box.innerHTML = "";
            snap.forEach(m => {
                const msg = m.data();
                const isMe = msg.user === auth.currentUser.phoneNumber;
                box.innerHTML += `<div class="bubble ${isMe ? 'my' : 'other'}">${msg.text}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    };

    document.getElementById('back-btn').onclick = () => document.getElementById('chat-screen').style.display = 'none';

    document.getElementById('send-btn').onclick = async () => {
        const input = document.getElementById('msg-input');
        if (!input.value.trim()) return;
        await addDoc(collection(db, "chats"), {
            chatId: activeChatId, // Obligatorio para el índice
            user: auth.currentUser.phoneNumber, // Cambiado de 'sender' a 'user' como en image_b0cbc9.png
            text: input.value,
            timestamp: serverTimestamp()
        });
        input.value = "";
    };
</script>
</body>
</html>
