<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUTTERFLY | Digital Luxury</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #1c1c1c; --accent: #9b8a78; --card: #2c2c2c; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; color: white; }
        .login-card { background: var(--card); padding: 40px; border-radius: 30px; text-align: center; width: 90%; max-width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .logo { width: 90px; border-radius: 22px; margin-bottom: 20px; border: 2px solid #444; }
        .iti { width: 100%; margin-bottom: 20px; color: black; }
        #phone { width: 100%; height: 50px; border-radius: 12px; border: none; font-size: 16px; }
        .btn-primary { background: var(--accent); color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 16px; }
        #otp-input { width: 100%; height: 50px; border-radius: 12px; border: 1px solid var(--accent); text-align: center; font-size: 24px; margin-top: 15px; display: none; background: #333; color: white; letter-spacing: 4px; }
        #recaptcha-container { margin: 15px 0; display: flex; justify-content: center; }
    </style>
</head>
<body>

<div class="login-card">
    <img src="Logo.jpeg" class="logo">
    <h2 style="margin:0 0 10px;">BUTTERFLY</h2>
    <p style="color: #aaa; font-size: 14px; margin-bottom: 25px;">Ingresa tu número para acceder.</p>
    
    <input type="tel" id="phone">
    <div id="recaptcha-container"></div>
    
    <button class="btn-primary" id="btn-action" onclick="processLogin()">Continuar</button>
    <input type="text" id="otp-input" placeholder="000000" maxlength="6">
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCpbEqoc9-lgVna4c8SsdUimZLQGjSN3gE",
        authDomain: "butterfly-2f1ba.firebaseapp.com",
        projectId: "butterfly-2f1ba",
        storageBucket: "butterfly-2f1ba.firebasestorage.app",
        messagingSenderId: "668042697742",
        appId: "1:668042697742:web:655b9d4ba13088d58ef05f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const iti = window.intlTelInput(document.querySelector("#phone"), {
        initialCountry: "py",
        separateDialCode: true,
        utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/utils.js",
    });

    let step = 1;

    window.processLogin = async () => {
        const btn = document.getElementById('btn-action');
        
        if (step === 1) {
            const phoneNumber = iti.getNumber();
            
            // Usamos tu ID de la foto directamente aquí
            window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
                'size': 'normal',
                'sitekey': '6LfWMNEsAAAAAD3Z21QA_y1GQE7hsLJiTk6pLIfN'
            });

            try {
                btn.innerText = "Enviando...";
                window.confirmationResult = await signInWithPhoneNumber(auth, phoneNumber, window.recaptchaVerifier);
                
                document.getElementById('otp-input').style.display = 'block';
                btn.innerText = "Verificar Código";
                step = 2;
            } catch (error) {
                alert("Error: " + error.message);
                btn.innerText = "Continuar";
                if(window.recaptchaVerifier) window.recaptchaVerifier.render().then(id => grecaptcha.reset(id));
            }
        } else {
            const code = document.getElementById('otp-input').value;
            window.confirmationResult.confirm(code).then(() => {
                alert("¡Bienvenida, Leidyd!");
                // Aquí podrías poner: window.location.href = "chat.html";
            }).catch(() => alert("Código incorrecto, intenta de nuevo."));
        }
    };
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js');
    });
  }
</script>

</body>
</html>
