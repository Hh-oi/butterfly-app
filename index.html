<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUTTERFLY</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #d4a373; --bg: #fdfaf7; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; color: #333; overflow: hidden; }
        
        /* Contenedor Principal */
        .app-container { height: 100vh; display: flex; flex-direction: column; }

        /* Header Estilo Apple */
        header { padding: 40px 20px 10px; background: var(--bg); }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .logo-small { width: 35px; height: 35px; border-radius: 10px; }
        h1 { font-size: 24px; font-weight: 700; margin: 0; }
        
        /* Buscador */
        .search-bar { background: #ece0d1; border-radius: 12px; padding: 10px; display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .search-bar input { border: none; background: transparent; outline: none; flex: 1; font-size: 16px; }

        /* Lista de Chats */
        .chat-list { flex: 1; overflow-y: auto; padding: 0 20px; }
        .chat-item { display: flex; align-items: center; gap: 15px; padding: 15px 0; border-bottom: 1px solid #eee; cursor: pointer; }
        .avatar { width: 55px; height: 55px; border-radius: 50%; background: #ddd; object-fit: cover; }
        .chat-info { flex: 1; }
        .chat-info h3 { margin: 0; font-size: 16px; }
        .chat-info p { margin: 5px 0 0; font-size: 13px; color: #888; }
        .chat-meta { text-align: right; font-size: 12px; color: var(--accent); }
        .unread { background: #e29578; color: white; border-radius: 10px; padding: 2px 7px; font-size: 10px; margin-top: 5px; display: inline-block; }

        /* Navegación Inferior */
        nav { background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); padding: 15px; display: flex; justify-content: space-around; border-top: 1px solid #eee; }
        nav i { font-size: 20px; color: #bbb; cursor: pointer; }
        nav i.active { color: var(--accent); }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div class="header-top">
            <img src="Logo.jpeg" class="logo-small">
            <i class="fa-regular fa-pen-to-square"></i>
        </div>
        <h1>Chats</h1>
        <div class="search-bar">
            <i class="fa-solid fa-magnifying-glass" style="color: #888;"></i>
            <input type="text" placeholder="Buscar">
        </div>
    </header>

    <div class="chat-list" id="list">
        <div class="chat-item">
            <img src="https://i.pravatar.cc/150?u=leidyd" class="avatar">
            <div class="chat-info">
                <h3>Leidyd</h3>
                <p>Hey, el diseño quedó genial...</p>
            </div>
            <div class="chat-meta">
                <span>19:06</span><br>
                <span class="unread">1</span>
            </div>
        </div>
        <div class="chat-item">
            <img src="https://i.pravatar.cc/150?u=sirvina" class="avatar">
            <div class="chat-info">
                <h3>Sirvina</h3>
                <p>Mensaje recibido correctamente</p>
            </div>
            <div class="chat-meta">
                <span>14:08</span><br>
                <span class="unread">2</span>
            </div>
        </div>
    </div>

    <nav>
        <i class="fa-solid fa-comment active"></i>
        <i class="fa-solid fa-address-book"></i>
        <i class="fa-solid fa-gear"></i>
        <i class="fa-solid fa-circle-plus" style="font-size: 30px; color: var(--accent);"></i>
    </nav>
</div>

<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>
</body>
</html>
