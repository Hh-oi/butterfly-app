<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUTTERFLY</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Variables de color para ambos modos */
        :root {
            --bg: #fdfaf7;
            --header-bg: #ffffff;
            --text: #2c2c2c;
            --accent: #9b8a78;
            --search: #ece0d1;
            --item-border: #eee;
            --mine-bg: #2c2c2c;
            --mine-text: #fdfaf7;
        }

        /* Colores del Modo Oscuro */
        [data-theme="dark"] {
            --bg: #121212;
            --header-bg: #1a1a1a;
            --text: #e0e0e0;
            --accent: #d4a373;
            --search: #2c2c2c;
            --item-border: #333;
            --mine-bg: #d4a373;
            --mine-text: #121212;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; color: var(--text); overflow: hidden; transition: 0.3s; }
        
        /* HEADER */
        header { padding: 40px 20px 10px; background: var(--bg); }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .logo-small { width: 35px; height: 35px; border-radius: 10px; object-fit: cover; }
        h1 { font-size: 28px; font-weight: 700; margin: 0; }
        
        /* BOTÓN LUNA/SOL */
        .theme-toggle { font-size: 20px; cursor: pointer; color: var(--text); padding: 5px; }

        .search-bar { background: var(--search); border-radius: 12px; padding: 10px; display: flex; align-items: center; gap: 10px; margin: 15px 0; }
        .search-bar input { border: none; background: transparent; outline: none; flex: 1; font-size: 16px; color: var(--text); }
        
        .chat-list { flex: 1; overflow-y: auto; padding: 0 20px; }
        .chat-item { display: flex; align-items: center; gap: 15px; padding: 15px 0; border-bottom: 1px solid var(--item-border); cursor: pointer; }
        .avatar { width: 52px; height: 52px; border-radius: 12px; object-fit: cover; background: #eee; }
        .chat-info h3 { margin: 0; font-size: 15px; }
        .chat-info p { margin: 3px 0 0; font-size: 13px; color: #888; }
        
        /* VENTANA CHAT */
        #view-chat { position: fixed; top: 0; right: -100%; width: 100%; height: 100vh; background: var(--bg); display: flex; flex-direction: column; transition: 0.4s ease; z-index: 200; }
        #view-chat.active { right: 0; }
        .chat-header { padding: 45px 20px 15px; background: var(--header-bg); border-bottom: 1px solid var(--item-border); display: flex; align-items: center; gap: 15px; }
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        
        .msg { padding: 10px 14px; border-radius: 18px; max-width: 75%; font-size: 0.85rem; }
        .mine { align-self: flex-end; background: var(--mine-bg); color: var(--mine-text); border-bottom-right-radius: 2px; }
        .other { align-self: flex-start; background: var(--header-bg); border: 1px solid var(--item-border); color: var(--text); border-bottom-left-radius: 2px; }

        footer { padding: 15px; background: var(--header-bg); border-top: 1px solid var(--item-border); display: flex; gap: 10px; align-items: center; }
        footer input { flex: 1; border: none; background: var(--bg); padding: 12px 18px; border-radius: 25px; outline: none; color: var(--text); }
        
        nav { background: var(--header-bg); padding: 15px; display: flex; justify-content: space-around; border-top: 1px solid var(--item-border); }
        nav i { font-size: 20px; color: #bbb; }
        .btn-send { color: var(--accent); font-weight: 700; cursor: pointer; font-size: 0.75rem; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="view-list">
    <header>
        <div class="header-top">
            <img src="Logo.jpeg" class="logo-small">
            <div class="theme-toggle" id="themeBtn">
                <i class="fa-solid fa-moon"></i>
            </div>
        </div>
        <h1>Chats</h1>
        <div class="search-bar">
            <i class="fa-solid fa-magnifying-glass" style="color: #888;"></i>
            <input type="text" placeholder="Buscar">
        </div>
    </header>
    <div class="chat-list">
        <div class="chat-item" onclick="openChat('BUTTERFLY Group')">
            <img src="Logo.jpeg" class="avatar">
            <div class="chat-info">
                <h3>BUTTERFLY Chat</h3>
                <p>Toca para ver los mensajes...</p>
            </div>
        </div>
    </div>
    <nav>
        <i class="fa-solid fa-comment" style="color:var(--accent)"></i>
        <i class="fa-solid fa-address-book"></i>
        <i class="fa-solid fa-gear"></i>
    </nav>
</div>

<div id="view-chat">
    <div class="chat-header">
        <i class="fa-solid fa-chevron-left" onclick="closeChat()"></i>
        <img src="Logo.jpeg" style="width:35px; height:35px; border-radius:8px;">
        <h3 id="chat-title" style="font-size:16px; margin:0">Chat</h3>
    </div>
    <div id="chat-box"></div>
    <footer>
        <input type="text" id="msgInput" placeholder="Escribe un mensaje..." autocomplete="off">
        <div class="btn-send" id="sendBtn">Enviar</div>
    </footer>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCpbEqoc9-lgVna4c8SsdUimZLQGjSN3gE",
    authDomain: "butterfly-2f1ba.firebaseapp.com",
    projectId: "butterfly-2f1ba",
    storageBucket: "butterfly-2f1ba.firebasestorage.app",
    messagingSenderId: "668042697742",
    appId: "1:668042697742:web:655b9d4ba13088d58ef05f"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const messagesCol = collection(db, "messages");

  // MODO OSCURO LOGIC
  const themeBtn = document.getElementById('themeBtn');
  themeBtn.onclick = () => {
      const current = document.body.getAttribute('data-theme');
      if(current === 'dark') {
          document.body.removeAttribute('data-theme');
          themeBtn.innerHTML = '<i class="fa-solid fa-moon"></i>';
      } else {
          document.body.setAttribute('data-theme', 'dark');
          themeBtn.innerHTML = '<i class="fa-solid fa-sun"></i>';
      }
  };

  let usuario = localStorage.getItem('chat_user') || prompt("Dime tu nombre:") || "Invitado";
  localStorage.setItem('chat_user', usuario);

  window.openChat = (name) => {
      document.getElementById('chat-title').innerText = name;
      document.getElementById('view-chat').classList.add('active');
  };

  window.closeChat = () => {
      document.getElementById('view-chat').classList.remove('active');
  };

  const sendAction = async () => {
      const input = document.getElementById('msgInput');
      if(input.value.trim() !== "") {
          const text = input.value; input.value = "";
          await addDoc(messagesCol, { text, user: usuario, createdAt: serverTimestamp() });
      }
  };

  document.getElementById('sendBtn').onclick = sendAction;
  document.getElementById('msgInput').onkeypress = (e) => { if(e.key === 'Enter') sendAction(); };

  onSnapshot(query(messagesCol, orderBy("createdAt", "asc")), (snapshot) => {
      const box = document.getElementById('chat-box'); box.innerHTML = "";
      snapshot.forEach((doc) => {
          const msg = doc.data();
          const isMine = msg.user === usuario;
          const div = document.createElement('div');
          div.className = `msg ${isMine ? 'mine' : 'other'}`;
          div.innerHTML = `<span style="font-size:10px; opacity:0.7; display:block; margin-bottom:2px">${msg.user}</span>${msg.text}`;
          box.appendChild(div);
      });
      box.scrollTop = box.scrollHeight;
  });

  if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
</script>
</body>
</html>
