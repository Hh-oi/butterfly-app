<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUTTERFLY</title>
    <style>
        /* Estética Minimalista "Quiet Luxury" */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #fafafa; margin: 0; display: flex; flex-direction: column; height: 100vh; color: #333; }
        header { background: #fff; padding: 20px; border-bottom: 1px solid #eaeaea; text-align: center; font-weight: 300; letter-spacing: 4px; font-size: 1.2rem; }
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { background: #fff; padding: 12px 18px; border-radius: 20px; max-width: 80%; font-size: 0.9rem; line-height: 1.5; box-shadow: 0 2px 5px rgba(0,0,0,0.03); border: 1px solid #f0f0f0; align-self: flex-start; }
        .mine { align-self: flex-end; background: #1a1a1a; color: #fff; border: none; border-bottom-right-radius: 2px; }
        footer { padding: 20px; background: #fff; border-top: 1px solid #eaeaea; display: flex; gap: 12px; align-items: center; }
        input { flex: 1; border: 1px solid #e0e0e0; padding: 12px 20px; border-radius: 30px; outline: none; font-size: 0.9rem; transition: border 0.3s; }
        input:focus { border-color: #999; }
        button { background: #1a1a1a; color: #fff; border: none; padding: 12px 25px; border-radius: 30px; cursor: pointer; font-weight: 500; font-size: 0.85rem; letter-spacing: 1px; }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>

<header>BUTTERFLY</header>
<div id="chat-box"></div>

<footer>
    <input type="text" id="msgInput" placeholder="Escribe un mensaje..." autocomplete="off">
    <button id="sendBtn">ENVIAR</button>
</footer>

<script type="module">
  // Importamos Firebase desde la web (CDN)
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // Tu configuración oficial
  const firebaseConfig = {
    apiKey: "AIzaSyCpbEqoc9-lgVna4c8SsdUimZLQGjSN3gE",
    authDomain: "butterfly-2f1ba.firebaseapp.com",
    projectId: "butterfly-2f1ba",
    storageBucket: "butterfly-2f1ba.firebasestorage.app",
    messagingSenderId: "668042697742",
    appId: "1:668042697742:web:655b9d4ba13088d58ef05f",
    measurementId: "G-NCW8JDWE5V"
  };

  // Inicializar
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const messagesCol = collection(db, "messages");

  // Función para enviar
  const sendAction = async () => {
      const input = document.getElementById('msgInput');
      if(input.value.trim() !== "") {
          const text = input.value;
          input.value = ""; // Limpiamos rápido para que se sienta veloz
          try {
              await addDoc(messagesCol, {
                  text: text,
                  createdAt: serverTimestamp()
              });
          } catch (e) {
              console.error("Error al enviar: ", e);
          }
      }
  };

  document.getElementById('sendBtn').onclick = sendAction;
  
  // Enviar con la tecla Enter
  document.getElementById('msgInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendAction();
  });

  // Escuchar mensajes en tiempo real
  const q = query(messagesCol, orderBy("createdAt", "asc"));
  onSnapshot(q, (snapshot) => {
      const box = document.getElementById('chat-box');
      box.innerHTML = "";
      snapshot.forEach((doc) => {
          const msg = doc.data();
          const div = document.createElement('div');
          // Por ahora, todos tus mensajes salen como "mine" para que veas el diseño
          div.className = "message mine"; 
          div.textContent = msg.text;
          box.appendChild(div);
      });
      box.scrollTop = box.scrollHeight;
  });
</script>

</body>
</html>
