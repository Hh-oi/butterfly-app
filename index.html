<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BUTTERFLY | Acceso</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css"/>
    <style>
        :root { --bg: #121212; --accent: #9b8a78; --card: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; color: white; }
        .login-card { background: var(--card); padding: 40px 30px; border-radius: 30px; text-align: center; width: 85%; max-width: 350px; box-shadow: 0 15px 35px rgba(0,0,0,0.7); }
        .logo { width: 90px; height: 90px; border-radius: 20px; margin-bottom: 20px; object-fit: cover; border: 1.5px solid #333; }
        h2 { margin: 0; letter-spacing: 3px; font-weight: 400; font-size: 22px; }
        .subtitle { color: #777; font-size: 12px; margin-bottom: 30px; letter-spacing: 1px; }

        /* ARREGLO PARA QUE NO SE VEA FEO */
        .iti { width: 100%; margin-bottom: 20px; color: black; }
        #phone { 
            width: 100%; height: 55px; border-radius: 12px; border: 1px solid #444; 
            background: #2a2a2a; color: white; font-size: 17px;
            padding-left: 90px !important; /* Espacio para que el +595 no tape nada */
        }
        
        .btn-primary { 
            background: var(--accent); color: white; border: none; width: 100%; 
            padding: 16px; border-radius: 12px; font-weight: 600; font-size: 16px; cursor: pointer;
        }
        #otp-input { 
            width: 100%; height: 55px; border-radius: 12px; border: 2px solid var(--accent); 
            text-align: center; font-size: 24px; margin-top: 15px; display: none; 
            background: #000; color: white; letter-spacing: 5px; 
        }
        #recaptcha-container { margin: 20px 0; display: flex; justify-content: center; transform: scale(0.85); }
    </style>
</head>
<body>
<div class="login-card">
    <img src="Logo.jpeg" class="logo">
    <h2>BUTTERFLY</h2>
    <div class="subtitle">DIGITAL LUXURY</div>
    <input type="tel" id="phone">
    <div id="recaptcha-container"></div>
    <button class="btn-primary" id="btn-action" onclick="processLogin()">Continuar</button>
    <input type="text" id="otp-input" placeholder="000000" maxlength="6">
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCpbEqoc9-lgVna4c8SsdUimZLQGjSN3gE",
        authDomain: "butterfly-2f1ba.firebaseapp.com",
        projectId: "butterfly-2f1ba",
        storageBucket: "butterfly-2f1ba.firebasestorage.app",
        messagingSenderId: "668042697742",
        appId: "1:668042697742:web:655b9d4ba13088d58ef05f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const phoneInput = document.querySelector("#phone");
    const iti = window.intlTelInput(phoneInput, {
        initialCountry: "py",
        separateDialCode: true,
        utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/utils.js",
    });

    let step = 1;

    window.processLogin = async () => {
        const btn = document.getElementById('btn-action');
        if (step === 1) {
            const phoneNumber = iti.getNumber();
            if (!window.recaptchaVerifier) {
                window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
                    'size': 'normal',
                    'sitekey': '6LfWMNEsAAAAAD3Z21QA_y1GQE7hsLJiTk6pLIfN'
                });
            }
            try {
                btn.innerText = "Enviando...";
                window.confirmationResult = await signInWithPhoneNumber(auth, phoneNumber, window.recaptchaVerifier);
                document.getElementById('otp-input').style.display = 'block';
                btn.innerText = "Verificar Código";
                step = 2;
            } catch (e) { alert("Error: " + e.message); btn.innerText = "Continuar"; }
        } else {
            const code = document.getElementById('otp-input').value;
            window.confirmationResult.confirm(code).then(() => { alert("¡Acceso Concedido!"); })
            .catch(() => alert("Código incorrecto"));
        }
    };

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js'); });
    }
</script>
</body>
</html>
