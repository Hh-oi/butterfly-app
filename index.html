<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BUTTERFLY | Digital Luxury</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css"/>
    <style>
        :root { --bg: #1c1c1c; --accent: #9b8a78; --card: #2c2c2c; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; color: white; }
        
        .login-card { background: var(--card); padding: 40px 30px; border-radius: 35px; text-align: center; width: 85%; max-width: 360px; box-shadow: 0 20px 40px rgba(0,0,0,0.6); border: 1px solid #3d3d3d; }
        
        /* Ajuste del Logo para que no se deforme */
        .logo { width: 100px; height: 100px; border-radius: 25px; margin-bottom: 20px; object-fit: cover; border: 2px solid #444; }
        
        h2 { margin: 0 0 5px; letter-spacing: 3px; font-weight: 300; }
        .subtitle { color: #888; font-size: 13px; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 1px; }

        /* ARREGLO CRÍTICO: Espaciado del número de teléfono */
        .iti { width: 100%; margin-bottom: 20px; }
        #phone { 
            width: 100%; 
            height: 55px; 
            border-radius: 15px; 
            border: 1px solid #444; 
            background: #333; 
            color: white; 
            font-size: 18px; 
            padding-left: 85px !important; /* Espacio extra para que no se encime la bandera */
            transition: border 0.3s;
        }
        #phone:focus { border-color: var(--accent); outline: none; }

        .btn-primary { 
            background: var(--accent); 
            color: white; 
            border: none; 
            width: 100%; 
            padding: 16px; 
            border-radius: 15px; 
            font-weight: 600; 
            cursor: pointer; 
            font-size: 16px; 
            box-shadow: 0 4px 15px rgba(155, 138, 120, 0.3);
        }
        .btn-primary:disabled { background: #555; cursor: not-allowed; }

        #otp-input { 
            width: 100%; 
            height: 55px; 
            border-radius: 15px; 
            border: 2px solid var(--accent); 
            text-align: center; 
            font-size: 26px; 
            margin-top: 15px; 
            display: none; 
            background: #1a1a1a; 
            color: white; 
            letter-spacing: 6px; 
        }

        #recaptcha-container { margin: 20px 0; display: flex; justify-content: center; scale: 0.9; }
    </style>
</head>
<body>

<div class="login-card">
    <img src="Logo.jpeg" class="logo" alt="Butterfly Logo">
    <h2>BUTTERFLY</h2>
    <div class="subtitle">Acceso Exclusivo</div>
    
    <input type="tel" id="phone">
    <div id="recaptcha-container"></div>
    
    <button class="btn-primary" id="btn-action" onclick="processLogin()">Continuar</button>
    <input type="text" id="otp-input" placeholder="000000" maxlength="6">
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCpbEqoc9-lgVna4c8SsdUimZLQGjSN3gE",
        authDomain: "butterfly-2f1ba.firebaseapp.com",
        projectId: "butterfly-2f1ba",
        storageBucket: "butterfly-2f1ba.firebasestorage.app",
        messagingSenderId: "668042697742",
        appId: "1:668042697742:web:655b9d4ba13088d58ef05f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const iti = window.intlTelInput(document.querySelector("#phone"), {
        initialCountry: "py",
        separateDialCode: true,
        utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/utils.js",
    });

    let step = 1;

    window.processLogin = async () => {
        const btn = document.getElementById('btn-action');
        if (step === 1) {
            const phoneNumber = iti.getNumber();
            
            if (!window.recaptchaVerifier) {
                window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
                    'size': 'normal',
                    'sitekey': '6LfWMNEsAAAAAD3Z21QA_y1GQE7hsLJiTk6pLIfN'
                });
            }

            try {
                btn.innerText = "Enviando...";
                btn.disabled = true;
                window.confirmationResult = await signInWithPhoneNumber(auth, phoneNumber, window.recaptchaVerifier);
                document.getElementById('otp-input').style.display = 'block';
                btn.innerText = "Verificar Acceso";
                btn.disabled = false;
                step = 2;
            } catch (error) {
                alert("Error: " + error.message);
                btn.innerText = "Continuar";
                btn.disabled = false;
            }
        } else {
            const code = document.getElementById('otp-input').value;
            window.confirmationResult.confirm(code).then(() => {
                alert("Bienvenida a la experiencia Butterfly");
            }).catch(() => alert("Código incorrecto"));
        }
    };
</script>
</body>
</html>
