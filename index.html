<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BUTTERFLY</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="Logo.jpeg">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#00a884">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css"/>
    <style>
        :root { --wa-bg: #0b141a; --wa-header: #202c33; --wa-teal: #00a884; --wa-text: #e9edef; --wa-msg-my: #005c4b; --wa-msg-other: #233138; --wa-gray: #8696a0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--wa-bg); margin: 0; color: var(--wa-text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .app-bar { background: var(--wa-header); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #222d34; z-index: 100; }
        .logo-img { width: 35px; height: 35px; border-radius: 8px; object-fit: cover; }
        .brand-name { font-size: 20px; font-weight: 700; color: var(--wa-teal); }
        #chat-list { flex: 1; overflow-y: auto; }
        .contact-card { display: flex; align-items: center; padding: 12px 16px; gap: 15px; border-bottom: 0.5px solid #222d34; cursor: pointer; }
        .pfp-circle { width: 48px; height: 48px; border-radius: 50%; background: #3b4a54; overflow: hidden; }
        .pfp-circle img { width: 100%; height: 100%; object-fit: cover; }
        #chat-screen { display: none; position: fixed; inset: 0; background: #0b141a url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); z-index: 200; flex-direction: column; }
        .msg-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 4px; }
        .bubble { max-width: 85%; padding: 6px 12px; border-radius: 8px; font-size: 14.5px; }
        .my { align-self: flex-end; background: var(--wa-msg-my); border-top-right-radius: 0; }
        .other { align-self: flex-start; background: var(--wa-msg-other); border-top-left-radius: 0; }
        .input-bar { background: var(--wa-header); padding: 8px 12px; display: flex; align-items: center; gap: 8px; }
        #msg-input { flex: 1; background: #2a3942; border: none; padding: 10px 16px; border-radius: 20px; color: white; outline: none; }
        #modal-container { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 500; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-box { background: #233138; width: 85%; max-width: 320px; padding: 20px; border-radius: 20px; text-align: center; }
        .btn-teal { background: var(--wa-teal); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; }
        .fab { position: fixed; bottom: 25px; right: 20px; width: 56px; height: 56px; border-radius: 50%; background: var(--wa-teal); color: white; border: none; font-size: 24px; z-index: 50; }
        #login-overlay { position: fixed; inset: 0; background: var(--wa-bg); z-index: 1000; display: flex; align-items: center; justify-content: center; text-align: center; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div style="width: 85%;">
        <img src="Logo.jpeg" style="width:100px; border-radius:20px; margin-bottom:20px;">
        <h1 style="color:var(--wa-teal);">BUTTERFLY</h1>
        <input type="tel" id="phone-field">
        <div id="recaptcha-container"></div>
        <input type="text" id="otp-field" placeholder="Código SMS" style="display:none; width:100%; padding:15px; margin: 20px 0; background:#2a3942; border:none; color:white; border-radius:10px; text-align:center;">
        <button id="login-btn" class="btn-teal">INGRESAR</button>
    </div>
</div>

<div class="app-bar">
    <div style="display:flex; align-items:center; gap:12px;">
        <img src="Logo.jpeg" class="logo-img">
        <span class="brand-name">Butterfly</span>
    </div>
    <div id="dots-btn" style="color:var(--wa-gray); cursor:pointer;">⋮</div>
</div>

<div id="chat-list"></div>
<button class="fab" id="fab-add">+</button>

<div id="chat-screen">
    <div class="app-bar">
        <span id="back-btn" style="cursor:pointer; font-size:26px;">←</span>
        <div class="pfp-circle" style="width:34px; height:34px; margin-left:10px;"><img src="Logo.jpeg"></div>
        <div id="chat-user-name" style="flex:1; margin-left:10px; font-weight:500;">Usuario</div>
    </div>
    <div class="msg-box" id="msg-box"></div>
    <div class="input-bar">
        <input type="text" id="msg-input" placeholder="Mensaje" autocomplete="off">
        <button id="send-btn" style="background:none; border:none; color:var(--wa-teal); font-size:28px;">➤</button>
    </div>
</div>

<div id="modal-container">
    <div class="modal-box">
        <h3>Nuevo Chat</h3>
        <input type="tel" id="new-contact-num" style="width:100%; padding:12px; margin-bottom:15px; background:#2a3942; border:none; color:white; border-radius:10px;" placeholder="+595...">
        <button id="modal-add" class="btn-teal">AGREGAR</button>
        <p id="modal-close" style="color:var(--wa-gray); margin-top:15px; cursor:pointer;">Cancelar</p>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>
<script type="module">
    // 1. REGISTRO DEL MOTOR DE INSTALACIÓN
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').then(() => console.log("Motor Activo"));
    }

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, RecaptchaVerifier, signInWithPhoneNumber, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCpbEqoc9-lgVna4c8SsdUimZLQGjSN3gE",
        authDomain: "butterfly-2f1ba.firebaseapp.com",
        projectId: "butterfly-2f1ba",
        storageBucket: "butterfly-2f1ba.firebasestorage.app",
        messagingSenderId: "668042697742",
        appId: "1:668042697742:web:4574346fb1e055b28ef05f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let activeChatId = null, confirmation = null;

    const iti = window.intlTelInput(document.querySelector("#phone-field"), { initialCountry: "py", separateDialCode: true });

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('login-overlay').style.display = 'none';
            sync();
        }
    });

    document.getElementById('login-btn').onclick = async () => {
        if (!confirmation) {
            const verifier = new RecaptchaVerifier(auth, 'recaptcha-container', { 'size': 'invisible' });
            confirmation = await signInWithPhoneNumber(auth, iti.getNumber(), verifier);
            document.getElementById('otp-field').style.display = 'block';
        } else {
            await confirmation.confirm(document.getElementById('otp-field').value);
        }
    };

    document.getElementById('fab-add').onclick = () => document.getElementById('modal-container').style.display = 'flex';
    document.getElementById('modal-close').onclick = () => document.getElementById('modal-container').style.display = 'none';
    document.getElementById('modal-add').onclick = async () => {
        const n = document.getElementById('new-contact-num').value;
        if(n) {
            await addDoc(collection(db, "contacts"), { owner: auth.currentUser.phoneNumber, name: n, phone: n });
            document.getElementById('modal-container').style.display = 'none';
        }
    };

    function sync() {
        onSnapshot(query(collection(db, "contacts"), where("owner", "==", auth.currentUser.phoneNumber)), (s) => {
            const l = document.getElementById('chat-list');
            l.innerHTML = "";
            s.forEach(doc => {
                const c = doc.data();
                l.innerHTML += `<div class="contact-card" onclick="openChat('${c.phone}')">
                    <div class="pfp-circle"><img src="Logo.jpeg"></div>
                    <div><h4>${c.name}</h4><p style="font-size:12px; color:var(--wa-gray);">Toca para chatear</p></div>
                </div>`;
            });
        });
    }

    window.openChat = (phone) => {
        activeChatId = [auth.currentUser.phoneNumber, phone].sort().join("_");
        document.getElementById('chat-screen').style.display = 'flex';
        document.getElementById('chat-user-name').innerText = phone;
        const q = query(collection(db, "chats"), where("chatId", "==", activeChatId), orderBy("timestamp", "asc"));
        onSnapshot(q, (s) => {
            const b = document.getElementById('msg-box');
            b.innerHTML = "";
            s.forEach(m => {
                const d = m.data();
                b.innerHTML += `<div class="bubble ${d.user === auth.currentUser.phoneNumber ? 'my' : 'other'}">${d.text}</div>`;
            });
            b.scrollTop = b.scrollHeight;
        });
    };

    document.getElementById('back-btn').onclick = () => document.getElementById('chat-screen').style.display = 'none';

    const send = async () => {
        const i = document.getElementById('msg-input');
        if(!i.value.trim()) return;
        await addDoc(collection(db, "chats"), { chatId: activeChatId, user: auth.currentUser.phoneNumber, text: i.value, timestamp: serverTimestamp() });
        i.value = "";
    };

    document.getElementById('send-btn').onclick = send;
    document.getElementById('msg-input').onkeypress = (e) => { if(e.key==='Enter') send(); };
</script>
</body>
</html>
