<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BUTTERFLY | Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css"/>
    <style>
        :root { --bg: #0b141a; --accent: #9b8a78; --card: #1e1e1e; --my-msg: #005c4b; --other-msg: #202c33; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; color: #e9edef; overflow: hidden; }
        
        .login-card { background: #111b21; padding: 40px 30px; border-radius: 20px; text-align: center; width: 90%; max-width: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .logo { width: 70px; height: 70px; border-radius: 50%; margin-bottom: 10px; border: 2px solid var(--accent); }
        
        /* Estilo WhatsApp */
        #chat-container { display: none; flex-direction: column; height: 90vh; width: 100%; max-width: 500px; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-color: #0b141a; }
        #messages { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; padding: 20px; gap: 8px; }
        
        .msg-bubble { max-width: 65%; padding: 8px 12px; border-radius: 8px; font-size: 14.5px; position: relative; box-shadow: 0 1px 0.5px rgba(0,0,0,0.13); }
        .my-msg { align-self: flex-end; background: var(--my-msg); border-top-right-radius: 0; }
        .other-msg { align-self: flex-start; background: var(--other-msg); border-top-left-radius: 0; }
        
        .msg-user { font-size: 11px; font-weight: bold; color: var(--accent); display: block; margin-bottom: 3px; }
        
        .input-area { background: #202c33; padding: 10px 15px; display: flex; align-items: center; gap: 10px; }
        #msg-input { flex-grow: 1; background: #2a3942; border: none; border-radius: 8px; padding: 12px; color: white; outline: none; }
        #btn-send { background: none; border: none; color: #8696a0; font-size: 24px; cursor: pointer; }

        /* Inputs de Login */
        #phone, #otp-input { width: 100%; height: 45px; border-radius: 8px; border: none; background: #2a3942; color: white; margin-bottom: 15px; padding: 0 10px; }
        .btn-primary { background: var(--accent); border: none; padding: 12px; border-radius: 8px; width: 100%; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="login-card" id="auth-card">
    <div id="auth-section">
        <img src="Logo.jpeg" class="logo" alt="Logo">
        <h2 style="margin: 5px 0;">BUTTERFLY</h2>
        <p style="color: #8696a0; font-size: 13px;">Acceso con tu número de teléfono</p>
        
        <input type="tel" id="phone">
        <div id="recaptcha-container"></div>
        <input type="text" id="otp-input" placeholder="Código de verificación" style="display:none;">
        <button class="btn-primary" id="btn-action">SIGUIENTE</button>
    </div>
</div>

<div id="chat-container">
    <div style="background: #202c33; padding: 10px 20px; display: flex; align-items: center; gap: 10px;">
        <img src="Logo.jpeg" style="width: 40px; height: 40px; border-radius: 50%;">
        <div>
            <div style="font-weight: bold;">BUTTERFLY LUXURY</div>
            <div style="font-size: 12px; color: #8696a0;">en línea</div>
        </div>
    </div>
    <div id="messages"></div>
    <div class="input-area">
        <input type="text" id="msg-input" placeholder="Escribe un mensaje">
        <button id="btn-send">➤</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCpbEqoc9-lgVna4c8SsdUimZLQGjSN3gE",
        authDomain: "butterfly-2f1ba.firebaseapp.com",
        projectId: "butterfly-2f1ba",
        storageBucket: "butterfly-2f1ba.firebasestorage.app",
        messagingSenderId: "668042697742",
        appId: "1:668042697742:web:4574346fb1e055b28ef05f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const iti = window.intlTelInput(document.querySelector("#phone"), {
        initialCountry: "py",
        separateDialCode: true,
        utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/utils.js",
    });

    let step = 1;
    let confirmationResult = null;
    window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', { 'size': 'invisible' });

    const btnAction = document.getElementById('btn-action');

    btnAction.addEventListener('click', async () => {
        if (step === 1) {
            const phoneNumber = iti.getNumber();
            confirmationResult = await signInWithPhoneNumber(auth, phoneNumber, window.recaptchaVerifier);
            document.getElementById('otp-input').style.display = 'block';
            document.querySelector(".iti").style.display = 'none';
            step = 2;
        } else {
            const code = document.getElementById('otp-input').value;
            confirmationResult.confirm(code).then(() => {
                document.getElementById('auth-card').style.display = 'none';
                document.getElementById('chat-container').style.display = 'flex';
                loadMessages();
            });
        }
    });

    window.sendMsg = async () => {
        const input = document.getElementById('msg-input');
        if (!input.value.trim()) return;
        await addDoc(collection(db, "chats"), {
            text: input.value,
            user: auth.currentUser.phoneNumber,
            timestamp: serverTimestamp()
        });
        input.value = "";
    };

    document.getElementById('btn-send').addEventListener('click', window.sendMsg);
    document.getElementById('msg-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') window.sendMsg(); });

    function loadMessages() {
        const q = query(collection(db, "chats"), orderBy("timestamp", "asc"));
        onSnapshot(q, (snapshot) => {
            const msgDiv = document.getElementById('messages');
            msgDiv.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                const isMe = data.user === auth.currentUser.phoneNumber;
                msgDiv.innerHTML += `
                    <div class="msg-bubble ${isMe ? 'my-msg' : 'other-msg'}">
                        <span class="msg-user">${isMe ? 'Tú' : data.user}</span>
                        ${data.text}
                    </div>`;
            });
            msgDiv.scrollTop = msgDiv.scrollHeight;
        });
    }
</script>
</body>
</html>
