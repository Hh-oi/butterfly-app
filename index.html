<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Butterfly</title>
    <!-- Configuración para "Descargar" como App -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="Logo.jpeg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css"/>
    <style>
        :root { --wa-bg: #0b141a; --wa-header: #202c33; --wa-text: #e9edef; --wa-teal: #00a884; --wa-msg-my: #005c4b; --wa-msg-other: #202c33; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--wa-bg); margin: 0; color: var(--wa-text); height: 100vh; overflow: hidden; }
        .header-main { background: var(--wa-header); padding: 15px 15px 0; position: sticky; top: 0; z-index: 10; }
        .top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .tabs { display: flex; text-align: center; font-size: 14px; font-weight: bold; color: #8696a0; text-transform: uppercase; }
        .tab { flex: 1; padding: 12px 0; border-bottom: 3px solid transparent; }
        .tab.active { color: var(--wa-teal); border-bottom: 3px solid var(--wa-teal); }
        #contacts-list { overflow-y: auto; height: calc(100vh - 100px); }
        .chat-item { display: flex; padding: 12px 16px; gap: 15px; border-bottom: 0.5px solid #222d34; }
        .avatar-circle { width: 50px; height: 50px; border-radius: 50%; background: #6a7175; display: flex; align-items: center; justify-content: center; font-size: 22px; }
        .chat-details { flex: 1; border-bottom: 0.5px solid #222d34; padding-bottom: 10px; }
        #chat-screen { display: none; position: fixed; inset: 0; background: #0b141a url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); z-index: 100; flex-direction: column; }
        .chat-nav { background: var(--wa-header); padding: 10px; display: flex; align-items: center; gap: 10px; }
        .msg-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 5px; }
        .bubble { max-width: 75%; padding: 8px 12px 18px; border-radius: 8px; font-size: 15px; position: relative; }
        .my { align-self: flex-end; background: var(--wa-msg-my); }
        .other { align-self: flex-start; background: var(--wa-msg-other); }
        .msg-time { position: absolute; bottom: 4px; right: 8px; font-size: 10px; opacity: 0.6; }
        .footer-chat { background: #1f2c33; padding: 10px; display: flex; align-items: center; gap: 10px; }
        #msg-input { flex: 1; background: #2a3942; border: none; padding: 12px; border-radius: 25px; color: white; outline: none; }
        .fab { position: fixed; bottom: 25px; right: 20px; width: 55px; height: 55px; border-radius: 50%; background: var(--wa-teal); border: none; color: white; font-size: 24px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        #auth-screen { position: fixed; inset: 0; background: var(--wa-bg); z-index: 1000; display: flex; align-items: center; justify-content: center; text-align: center; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div style="width: 85%;">
        <img src="Logo.jpeg" style="width:80px; border-radius:20px; margin-bottom:15px;">
        <h2>WhatsApp Butterfly</h2>
        <input type="tel" id="phone" style="width:100%; margin-bottom:10px;">
        <div id="recaptcha-container"></div>
        <input type="text" id="otp-input" placeholder="Código de 6 dígitos" style="display:none; width:100%; padding:12px; background:#2a3942; border:none; color:white; border-radius:8px; margin-bottom:15px; text-align:center;">
        <button id="btn-login" style="width:100%; padding:15px; background:var(--wa-teal); border:none; color:white; font-weight:bold; border-radius:8px;">COMENZAR</button>
    </div>
</div>

<div class="header-main">
    <div class="top-row"><span style="color:#8696a0; font-size:20px;">WhatsApp</span></div>
    <div class="tabs"><div class="tab">📷</div><div class="tab active">Chats</div><div class="tab">Estados</div><div class="tab">Llamadas</div></div>
</div>

<div id="contacts-list"></div>
<button class="fab" id="new-chat">+</button>

<div id="chat-screen">
    <div class="chat-nav">
        <span id="close-chat" style="font-size:24px;">←</span>
        <div class="avatar-circle" style="width:35px; height:35px; font-size:14px;">👤</div>
        <div id="chat-title" style="flex:1; font-weight:500;">Nombre</div>
    </div>
    <div class="msg-container" id="msg-list"></div>
    <div class="footer-chat">
        <input type="text" id="msg-input" placeholder="Mensaje">
        <button id="send-btn" style="background:none; border:none; color:var(--wa-teal); font-size:24px;">➤</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, RecaptchaVerifier, signInWithPhoneNumber, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCpbEqoc9-lgVna4c8SsdUimZLQGjSN3gE",
        authDomain: "butterfly-2f1ba.firebaseapp.com",
        projectId: "butterfly-2f1ba",
        storageBucket: "butterfly-2f1ba.firebasestorage.app",
        messagingSenderId: "668042697742",
        appId: "1:668042697742:web:4574346fb1e055b28ef05f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let currentChatId = null, confirmationResult = null;

    const iti = window.intlTelInput(document.querySelector("#phone"), { initialCountry: "py", separateDialCode: true });

    onAuthStateChanged(auth, (user) => { if (user) { document.getElementById('auth-screen').style.display = 'none'; loadContacts(); } });

    document.getElementById('btn-login').onclick = async () => {
        const btn = document.getElementById('btn-login');
        if (btn.innerText === "COMENZAR") {
            const verifier = new RecaptchaVerifier(auth, 'recaptcha-container', { 'size': 'invisible' });
            confirmationResult = await signInWithPhoneNumber(auth, iti.getNumber(), verifier);
            document.getElementById('otp-input').style.display = 'block';
            btn.innerText = "VERIFICAR";
        } else {
            await confirmationResult.confirm(document.getElementById('otp-input').value);
        }
    };

    document.getElementById('new-chat').onclick = async () => {
        const num = prompt("Número (+595...):");
        if (num) await addDoc(collection(db, "contacts"), { owner: auth.currentUser.phoneNumber, name: num, contactNum: num });
    };

    function loadContacts() {
        onSnapshot(query(collection(db, "contacts"), where("owner", "==", auth.currentUser.phoneNumber)), (snap) => {
            const list = document.getElementById('contacts-list');
            list.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                const div = document.createElement('div');
                div.className = 'chat-item';
                div.innerHTML = `<div class="avatar-circle">👤</div><div class="chat-details"><h4>${d.name}</h4><p style="color:#8696a0; font-size:13px;">Toca para chatear</p></div>`;
                div.onclick = () => openChat(d.contactNum);
                list.appendChild(div);
            });
        });
    }

    window.openChat = (num) => {
        currentChatId = [auth.currentUser.phoneNumber, num].sort().join("_");
        document.getElementById('chat-screen').style.display = 'flex';
        document.getElementById('chat-title').innerText = num;
        loadMessages();
    };

    document.getElementById('close-chat').onclick = () => document.getElementById('chat-screen').style.display = 'none';

    function loadMessages() {
        onSnapshot(query(collection(db, "messages"), where("chatId", "==", currentChatId), orderBy("timestamp", "asc")), (snap) => {
            const list = document.getElementById('msg-list');
            list.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                const isMe = d.sender === auth.currentUser.phoneNumber;
                const time = d.timestamp ? new Date(d.timestamp.toDate()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '--:--';
                list.innerHTML += `<div class="bubble ${isMe ? 'my' : 'other'}">${d.text}<span class="msg-time">${time}</span></div>`;
            });
            list.scrollTop = list.scrollHeight;
        });
    }

    document.getElementById('send-btn').onclick = async () => {
        const input = document.getElementById('msg-input');
        if (!input.value.trim()) return;
        await addDoc(collection(db, "messages"), { chatId: currentChatId, sender: auth.currentUser.phoneNumber, text: input.value, timestamp: serverTimestamp() });
        input.value = "";
    };
</script>
</body>
</html>
